<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Connect | Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:380px;
            background:#ffffff;
            padding:35px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#0f172a;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:#666;
            margin-bottom:25px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-bottom:6px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d4ed8;
        }

        .links{
            margin-top:20px;
            text-align:center;
        }

        .links a{
            color:#2563eb;
            text-decoration:none;
        }

        .links a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Digital Connect</h1>
    <p>Sign in to access your account.</p>

    <form action="login.php" method="POST">

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>

        <button type="submit">Login</button>

    </form>

    <div class="links">
        <p><a href="forgot-password.html">Forgot Password?</a></p>
        <p>Don't have an account? <a href="register.html">Register</a></p>
    </div>

</div>

</body>
</html>
