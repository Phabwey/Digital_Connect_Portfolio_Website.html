<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | CollaborateX</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0b2d5b,#1565c0);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{

    width:400px;
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);

}

.logo{

    text-align:center;
    margin-bottom:25px;

}

.logo h1{

    color:#0b2d5b;
    font-size:32px;

}

.logo p{

    color:#777;
    margin-top:8px;

}

h2{

    text-align:center;
    color:#0b2d5b;
    margin-bottom:25px;

}

.form-group{

    margin-bottom:20px;

}

label{

    display:block;
    margin-bottom:8px;
    font-weight:bold;

}

input{

    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;

}

input:focus{

    border-color:#1565c0;
    outline:none;

}

.options{

    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    font-size:14px;

}

.options a{

    text-decoration:none;
    color:#1565c0;
    font-weight:bold;

}

button{

    width:100%;
    padding:13px;
    border:none;
    background:#0b2d5b;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;

}

button:hover{

    background:#1565c0;

}

.register{

    text-align:center;
    margin-top:20px;

}

.register a{

    color:#1565c0;
    text-decoration:none;
    font-weight:bold;

}

.social{

    text-align:center;
    margin-top:25px;

}

.social p{

    margin-bottom:10px;
    color:#666;

}

.social button{

    width:48%;
    margin:2px;
    background:#f5f5f5;
    color:#333;
    border:1px solid #ddd;

}

.social button:hover{

    background:#ddd;

}

footer{

    text-align:center;
    margin-top:25px;
    color:#777;
    font-size:13px;

}

</style>

</head>

<body>

<div class="login-container">

<div class="logo">

<h1>CollaborateX</h1>

<p>Academic Collaboration Platform</p>

</div>

<h2>Login to Your Account</h2>

<form action="index.html" method="post">

<div class="form-group">

<label>Email Address</label>

<input
type="email"
name="email"
placeholder="Enter your email"
required>

</div>

<div class="form-group">

<label>Password</label>

<input
type="password"
name="password"
placeholder="Enter your password"
required>

</div>

<div class="options">

<label>

<input type="checkbox">

Remember Me

</label>

<a href="forgot-password.html">

Forgot Password?

</a>

</div>

<button type="submit">

Login

</button>

</form>

<div class="register">

<p>

Don't have an account?

<a href="register.html">

Register Here

</a>

</p>

</div>

<div class="social">

<p>Or continue with</p>

<button>Google</button>

<button>Microsoft</button>

</div>

<footer>

<p>

© 2026 CollaborateX | All Rights Reserved

</p>

</footer>

</div>

</body>
</html>
